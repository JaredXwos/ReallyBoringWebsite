<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Room</title>
<style>
  :root {
    --bg: #0b1620;
    --panel: #0f1e28;
    --panel-2: #14293489;
    --input-bg: #0d1a23;
    --border: #22323f;
    --text: #dce8ed;
    --text-muted: #7c93a0;
    --text-faint: #4d616c;
    --accent: #4fd1b5;
    --accent-dim: #2c4d47;
    --warn: #e2725b;
    --warn-dim: #4a2e28;
    --font-mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 600;
  }

  section {
    flex: 0 0 auto;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  section.grow {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-bottom: none;
  }

  h2 {
    margin: 0 0 10px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 8px;
  }

  /* --- identity --- */
  .identity-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pulse-dot {
    position: relative;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex: 0 0 auto;
  }
  .pulse-dot::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.6;
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(0.4); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .pulse-dot::after { animation: none; opacity: 0; }
  }

  #my-pubkey {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    flex: 1 1 auto;
    overflow-x: auto;
    white-space: nowrap;
  }

  button {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 8px 12px;
    cursor: pointer;
  }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  button:disabled { opacity: 0.5; cursor: default; }

  input[type="text"] {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    flex: 1 1 auto;
    min-width: 0;
  }
  input[type="text"].sans { font-family: var(--font-sans); }
  input[type="text"]:focus, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  input::placeholder { color: var(--text-faint); }

  .row { display: flex; gap: 8px; align-items: center; }

  .hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  /* --- peers --- */
  #peer-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }
  .peer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
  }
  .peer-row .pulse-dot { width: 6px; height: 6px; }
  .peer-name {
    font-size: 13px;
    color: var(--text);
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .peer-name.unknown {
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-style: normal;
  }
  .peer-key {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
  }
  .empty {
    color: var(--text-faint);
    font-size: 13px;
    padding: 10px 2px;
  }

  /* --- log --- */
  #log {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
  }
  .log-line { white-space: pre-wrap; word-break: break-word; }
  .log-info  { color: var(--text-muted); }
  .log-event { color: var(--accent); }
  .log-error { color: var(--warn); }
  .log-time  { color: var(--text-faint); }
</style>
</head>
<body>

  <section>
    <div class="eyebrow">Coralie · Room</div>
    <h2 style="margin-top:6px;">My node</h2>
    <div class="identity-row">
      <span class="pulse-dot"></span>
      <div id="my-pubkey">loading…</div>
      <button id="copy-pubkey-btn">Copy</button>
    </div>
  </section>

  <section>
    <h2>Username</h2>
    <div class="row">
      <input type="text" class="sans" id="username-input" placeholder="Your name" maxlength="40" />
      <button class="primary" id="save-username-btn">Save</button>
    </div>
    <div class="hint">Stored on this device and shared with peers you're connected to.</div>
  </section>

  <section>
    <h2>Add peer</h2>
    <div class="row">
      <input type="text" id="peer-input" placeholder="Paste a public key" />
      <button class="primary" id="add-peer-btn">Add</button>
    </div>
  </section>

  <section>
    <h2>Peers <span class="badge" id="peer-count">0</span></h2>
    <div id="peer-list">
      <div class="empty">No peers connected</div>
    </div>
  </section>

  <section class="grow">
    <h2>Log</h2>
    <div id="log"></div>
  </section>

<!-- CoralieCore library (dist/index.global.js) -->
<script src="index.global.js"></script>

<script>
(function () {
  "use strict";

  // ---- state ----
  let manager = null;
  let myPubkeyHex = null;
  let myUsername = null;
  // pubkeyHex -> username (null while unknown)
  const peers = new Map();

  // ---- dom refs ----
  const el = {
    myPubkey: document.getElementById("my-pubkey"),
    copyBtn: document.getElementById("copy-pubkey-btn"),
    usernameInput: document.getElementById("username-input"),
    saveUsernameBtn: document.getElementById("save-username-btn"),
    peerInput: document.getElementById("peer-input"),
    addPeerBtn: document.getElementById("add-peer-btn"),
    peerList: document.getElementById("peer-list"),
    peerCount: document.getElementById("peer-count"),
    log: document.getElementById("log"),
  };

  // ---- log panel ----
  const MAX_LOG_LINES = 300;
  function log(level, message) {
    const time = new Date().toLocaleTimeString([], { hour12: false });
    const line = document.createElement("div");
    line.className = "log-line log-" + level;
    line.textContent = "[" + time + "] " + message;
    el.log.appendChild(line);
    while (el.log.childElementCount > MAX_LOG_LINES) {
      el.log.removeChild(el.log.firstChild);
    }
    el.log.scrollTop = el.log.scrollHeight;
  }

  function shortKey(pk) {
    if (!pk || pk.length <= 14) return pk || "";
    return pk.slice(0, 7) + "…" + pk.slice(-6);
  }

  // ---- base64 helpers (UTF-8 safe) ----
  function b64EncodeUtf8(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64DecodeUtf8(b64) {
    return decodeURIComponent(escape(atob(b64)));
  }

  // ---- peer username protocol ----
  // Payload is base64(JSON.stringify({ type: "username", name })).
  function encodeUsernameAnnouncement(name) {
    return b64EncodeUtf8(JSON.stringify({ type: "username", name: name }));
  }

  function announceUsernameTo(pubkeyHex) {
    if (!myUsername || !manager) {
      if (!myUsername) {
        log("info", "Skipping username announce: no username set yet");
      }
      return;
    }
    try {
      const payload = encodeUsernameAnnouncement(myUsername);
      log("info", "Announcing username to " + shortKey(pubkeyHex) + ": " + myUsername);
      manager.sendToPeer(pubkeyHex, payload);
      log("info", "Username announcement sent to " + shortKey(pubkeyHex));
    } catch (e) {
      log("error", "Couldn't send username to " + shortKey(pubkeyHex) + ": " + e.message);
    }
  }

  function announceUsernameToAllPeers() {
    for (const pk of peers.keys()) announceUsernameTo(pk);
  }

  // ---- rendering ----
  function renderPeers() {
    el.peerCount.textContent = String(peers.size);
    el.peerList.innerHTML = "";
    if (peers.size === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No peers connected";
      el.peerList.appendChild(empty);
      return;
    }
    for (const [pk, name] of peers.entries()) {
      const row = document.createElement("div");
      row.className = "peer-row";

      const dot = document.createElement("span");
      dot.className = "pulse-dot";

      const label = document.createElement("span");
      if (name) {
        label.className = "peer-name";
        label.textContent = name;
      } else {
        label.className = "peer-name unknown";
        label.textContent = shortKey(pk) + " (no username yet)";
      }
      label.title = pk;

      row.appendChild(dot);
      row.appendChild(label);
      el.peerList.appendChild(row);
    }
  }

  // ---- mesh event handling ----
  function handlePeersEvent(peerSet) {
    // peerSet is a Set of peer objects, not an array
    const incoming = new Set();
    
    if (!peerSet || typeof peerSet !== 'object') {
      log("error", "Invalid peerSet: " + typeof peerSet);
      return;
    }
    
    // Convert Set to array and extract pubkeyHex
    const peerArray = Array.isArray(peerSet) ? peerSet : Array.from(peerSet || []);
    log("info", "Peers event received: " + peerArray.length + " peer(s)");
    
    for (const peer of peerArray) {
      if (peer && peer.pubkeyHex) {
        incoming.add(peer.pubkeyHex);
        log("info", "  - Peer: " + shortKey(peer.pubkeyHex));
      }
    }

    // New peers
    for (const pk of incoming) {
      if (!peers.has(pk)) {
        peers.set(pk, null);
        log("event", "✓ NEW PEER: " + shortKey(pk));
        announceUsernameTo(pk);
      }
    }
    
    // Disconnected peers
    for (const pk of Array.from(peers.keys())) {
      if (!incoming.has(pk)) {
        peers.delete(pk);
        log("event", "✗ PEER DISCONNECTED: " + shortKey(pk));
      }
    }
    
    renderPeers();
  }

  function handleMessageEvent(message) {
    const fromPubkeyHex = message.from;
    const payload = message.payload;
    if (!fromPubkeyHex || typeof payload !== "string") {
      log("error", "Malformed message event: missing from or payload");
      return;
    }

    log("info", "Processing message from " + shortKey(fromPubkeyHex) + " (size: " + payload.length + ")");

    let decoded;
    try {
      decoded = JSON.parse(b64DecodeUtf8(payload));
    } catch (e) {
      log("error", "Couldn't decode message from " + shortKey(fromPubkeyHex) + ": " + e.message);
      return;
    }

    if (decoded && decoded.type === "username" && typeof decoded.name === "string") {
      const wasKnown = peers.has(fromPubkeyHex);
      peers.set(fromPubkeyHex, decoded.name);
      log("event", shortKey(fromPubkeyHex) + " \u2192 " + decoded.name);
      if (wasKnown) renderPeers();
      return;
    }

    log("info", "Message from " + shortKey(fromPubkeyHex) + " (type: " + (decoded ? decoded.type : "unknown") + ")");
  }

  function handleTerminalFailureEvent(failure) {
    const pubkeyHex = failure.pubkeyHex;
    const attempts = failure.attemptCount;
    log("error", "Connection to " + shortKey(pubkeyHex) + " failed permanently after " + attempts + " attempt(s)");
  }

  // ---- identity ----
  async function copyPubkey() {
    if (!myPubkeyHex) return;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(myPubkeyHex);
      } else {
        const ta = document.createElement("textarea");
        ta.value = myPubkeyHex;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      log("info", "Public key copied");
    } catch (e) {
      log("error", "Copy failed: " + e.message);
    }
  }

  function initManager() {
    try {
      // Initialize manager with real Nostr relays (same as integration tests)
      const relayUrls = [
        'wss://relay.damus.io',
        'wss://nos.lol',
        'wss://nostr.oxtr.dev',
      ]
      
      log("info", "Initializing manager with relays: " + relayUrls.join(", "));
      
      manager = window.CoralieCore.createLiveConnectionManager({
        relayUrls: relayUrls,
      });
      
      myPubkeyHex = manager.myPubkeyHex;
      el.myPubkey.textContent = myPubkeyHex;
      log("info", "Manager initialized - pubkey: " + shortKey(myPubkeyHex));
      log("info", "Full pubkey: " + myPubkeyHex);
      
      // Log manager state for debugging
      log("info", "Manager object: " + (manager ? "exists" : "null"));
      log("info", "Manager properties: peers=" + (manager.peers ? "Set" : "missing") + ", incomingMessages=" + (manager.incomingMessages ? "Flow" : "missing") + ", terminalFailures=" + (manager.terminalFailures ? "Flow" : "missing"));

      // Wrap peer updates with detailed logging
      let peerUpdateCount = 0;
      const peersSubscription = manager.peers.subscribe((peerSet) => {
        peerUpdateCount++;
        log("info", `[peers.${peerUpdateCount}] Event received`);
        log("info", `  Type: ${typeof peerSet}`);
        log("info", `  Is Set: ${peerSet instanceof Set}`);
        log("info", `  Is Array: ${Array.isArray(peerSet)}`);
        if (peerSet) {
          const arr = Array.from(peerSet || []);
          log("info", `  Length: ${arr.length}`);
          arr.forEach((p, i) => {
            log("info", `    [${i}] ${typeof p === 'object' ? 'object' : typeof p} - pubkeyHex=${p?.pubkeyHex ? shortKey(p.pubkeyHex) : 'missing'}`);
          });
        }
        handlePeersEvent(peerSet);
      });

      // Wrap incoming messages with detailed logging
      let messageCount = 0;
      const messagesSubscription = manager.incomingMessages.subscribe((message) => {
        messageCount++;
        log("info", `[message.${messageCount}] Received`);
        log("info", `  From: ${message.from ? shortKey(message.from) : 'missing'}`);
        log("info", `  Payload length: ${message.payload ? message.payload.length : 'missing'}`);
        handleMessageEvent(message);
      });

      // Wrap terminal failures with detailed logging
      let failureCount = 0;
      const failuresSubscription = manager.terminalFailures.subscribe((failure) => {
        failureCount++;
        log("error", `[failure.${failureCount}] Terminal failure`);
        log("error", `  Pubkey: ${failure.pubkeyHex ? shortKey(failure.pubkeyHex) : 'missing'}`);
        log("error", `  Attempts: ${failure.attemptCount || 'missing'}`);
        log("error", `  Reason: Offer/answer negotiation failed (NAT/firewall or peer not listening?)`);
        handleTerminalFailureEvent(failure);
      });
      
      log("info", "Manager subscriptions active - ready for peers");
    } catch (e) {
      el.myPubkey.textContent = "unavailable";
      log("error", "Couldn't initialize manager: " + e.message);
      log("error", "Stack: " + e.stack);
    }
  }

  // ---- username ----
  function loadUsername() {
    try {
      const value = localStorage.getItem("username");
      myUsername = value || null;
      el.usernameInput.value = value || "";
    } catch (e) {
      myUsername = null;
      log("info", "No username set yet");
    }
  }

  function saveUsername() {
    const name = el.usernameInput.value.trim();
    if (!name) return;
    el.saveUsernameBtn.disabled = true;
    try {
      localStorage.setItem("username", name);
      myUsername = name;
      log("info", "Username saved: " + name);
      announceUsernameToAllPeers();
    } catch (e) {
      log("error", "Couldn't save username: " + e.message);
    } finally {
      el.saveUsernameBtn.disabled = false;
    }
  }

  // ---- add peer ----
  function addPeer() {
    if (!manager) {
      log("error", "Manager not initialized");
      return;
    }
    const pubkeyHex = el.peerInput.value.trim();
    if (!pubkeyHex) {
      log("error", "Peer pubkey cannot be empty");
      return;
    }
    
    if (pubkeyHex === myPubkeyHex) {
      log("error", "Cannot add yourself as a peer");
      return;
    }
    
    el.addPeerBtn.disabled = true;
    try {
      log("info", "═══ Adding peer ═══");
      log("info", "Target pubkey: " + shortKey(pubkeyHex));
      log("info", "This will attempt WebRTC negotiation via relay");
      manager.addPeer(pubkeyHex);
      log("info", "✓ Peer addition requested");
      log("info", "Waiting for offer/answer exchange...");
      el.peerInput.value = "";
    } catch (e) {
      log("error", "Couldn't add peer: " + e.message);
    } finally {
      el.addPeerBtn.disabled = false;
    }
  }

  // ---- wiring ----
  el.copyBtn.addEventListener("click", copyPubkey);
  el.saveUsernameBtn.addEventListener("click", saveUsername);
  el.usernameInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") saveUsername();
  });
  el.addPeerBtn.addEventListener("click", addPeer);
  el.peerInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") addPeer();
  });

  // ---- init ----
  (function init() {
    log("info", "═══════════════════════════════════");
    log("info", "Coralie Room initialized");
    log("info", "═══════════════════════════════════");
    initManager();
    loadUsername();
    log("info", "Startup complete - waiting for peers...");
  })();
})();
</script>
</body>
</html>
