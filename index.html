<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Trystero Room</title>
<style>
  :root {
    --bg: #0b1620;
    --panel: #0f1e28;
    --panel-2: #14293489;
    --input-bg: #0d1a23;
    --border: #22323f;
    --text: #dce8ed;
    --text-muted: #7c93a0;
    --text-faint: #4d616c;
    --accent: #4fd1b5;
    --accent-dim: #2c4d47;
    --warn: #e2725b;
    --warn-dim: #4a2e28;
    --font-mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 600;
  }

  section {
    flex: 0 0 auto;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  section.grow {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-bottom: none;
  }

  h2 {
    margin: 0 0 10px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 8px;
  }

  /* --- identity --- */
  .identity-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pulse-dot {
    position: relative;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex: 0 0 auto;
  }
  .pulse-dot.off { background: var(--text-faint); }
  .pulse-dot::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.6;
    animation: pulse 2.2s ease-out infinite;
  }
  .pulse-dot.off::after { display: none; }
  @keyframes pulse {
    0%   { transform: scale(0.4); opacity: 0.6; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .pulse-dot::after { animation: none; opacity: 0; }
  }

  #my-pubkey {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    flex: 1 1 auto;
    overflow-x: auto;
    white-space: nowrap;
  }

  button {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 8px 12px;
    cursor: pointer;
  }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  button.warn {
    background: var(--warn-dim);
    border-color: var(--warn);
    color: var(--warn);
  }
  button:disabled { opacity: 0.5; cursor: default; }

  input[type="text"] {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    flex: 1 1 auto;
    min-width: 0;
  }
  input[type="text"].sans { font-family: var(--font-sans); }
  input[type="text"]:focus, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  input[type="text"]:disabled { opacity: 0.5; }
  input::placeholder { color: var(--text-faint); }

  .row { display: flex; gap: 8px; align-items: center; }

  .hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  /* --- peers --- */
  #peer-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }
  .peer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
  }
  .peer-row .pulse-dot { width: 6px; height: 6px; }
  .peer-name {
    font-size: 13px;
    color: var(--text);
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .peer-name.unknown {
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-style: normal;
  }
  .peer-key {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
  }
  .empty {
    color: var(--text-faint);
    font-size: 13px;
    padding: 10px 2px;
  }

  /* --- log --- */
  #log {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
  }
  .log-line { white-space: pre-wrap; word-break: break-word; }
  .log-info  { color: var(--text-muted); }
  .log-event { color: var(--accent); }
  .log-error { color: var(--warn); }
  .log-time  { color: var(--text-faint); }
</style>
</head>
<body>

  <section>
    <div class="eyebrow">Coralie · Trystero Room</div>
    <h2 style="margin-top:6px;">My node</h2>
    <div class="identity-row">
      <span class="pulse-dot" id="my-dot"></span>
      <div id="my-pubkey">loading…</div>
      <button id="copy-pubkey-btn">Copy</button>
    </div>
  </section>

  <section>
    <h2>Username</h2>
    <div class="row">
      <input type="text" class="sans" id="username-input" placeholder="Your name" maxlength="40" />
      <button class="primary" id="save-username-btn">Save</button>
    </div>
    <div class="hint">Stored on this device and shared with peers you're connected to.</div>
  </section>

  <section>
    <h2>Room</h2>
    <div class="row">
      <input type="text" class="sans" id="room-input" placeholder="Room name" maxlength="60" />
      <button class="primary" id="join-room-btn">Join</button>
    </div>
    <div class="hint">Anyone who joins the same room name connects automatically — no key exchange needed.</div>
  </section>

  <section>
    <h2>Peers <span class="badge" id="peer-count">0</span></h2>
    <div id="peer-list">
      <div class="empty">No peers connected</div>
    </div>
  </section>

  <section class="grow">
    <h2>Log</h2>
    <div id="log"></div>
  </section>

<script type="module">
  import { joinRoom, selfId } from 'https://esm.run/trystero';

  "use strict";

  // A fixed, unique-ish namespace for this test app. Anyone using this same
  // appId + room name will find each other, so pick a room name that's
  // unlikely to collide with strangers if you don't want surprise peers.
  const APP_ID = "coralie-trystero-test-v1";

  // ---- indexeddb key/value store ----
  // Small wrapper around a single object store ("kv") used to persist
  // settings (username, last room) across sessions.
  const DB_NAME = "trystero-room-db";
  const DB_VERSION = 1;
  const STORE_NAME = "kv";

  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        if (!req.result.objectStoreNames.contains(STORE_NAME)) {
          req.result.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbGet(key) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result === undefined ? null : req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbSet(key, value) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // ---- state ----
  let myUsername = null;
  let room = null;
  let currentRoomName = null;
  let nameAction = null;
  // peerId -> username (null while unknown)
  const peers = new Map();

  // ---- dom refs ----
  const el = {
    myPubkey: document.getElementById("my-pubkey"),
    myDot: document.getElementById("my-dot"),
    copyBtn: document.getElementById("copy-pubkey-btn"),
    usernameInput: document.getElementById("username-input"),
    saveUsernameBtn: document.getElementById("save-username-btn"),
    roomInput: document.getElementById("room-input"),
    joinRoomBtn: document.getElementById("join-room-btn"),
    peerList: document.getElementById("peer-list"),
    peerCount: document.getElementById("peer-count"),
    log: document.getElementById("log"),
  };

  // ---- log panel ----
  const MAX_LOG_LINES = 300;
  function log(level, message) {
    const time = new Date().toLocaleTimeString([], { hour12: false });
    const line = document.createElement("div");
    line.className = "log-line log-" + level;
    line.textContent = "[" + time + "] " + message;
    el.log.appendChild(line);
    while (el.log.childElementCount > MAX_LOG_LINES) {
      el.log.removeChild(el.log.firstChild);
    }
    el.log.scrollTop = el.log.scrollHeight;
  }

  function shortKey(pk) {
    if (!pk || pk.length <= 14) return pk || "";
    return pk.slice(0, 7) + "…" + pk.slice(-6);
  }

  // ---- rendering ----
  function renderPeers() {
    el.peerCount.textContent = String(peers.size);
    el.peerList.innerHTML = "";
    if (peers.size === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No peers connected";
      el.peerList.appendChild(empty);
      return;
    }
    for (const [pk, name] of peers.entries()) {
      const row = document.createElement("div");
      row.className = "peer-row";

      const dot = document.createElement("span");
      dot.className = "pulse-dot";

      const label = document.createElement("span");
      if (name) {
        label.className = "peer-name";
        label.textContent = name;
      } else {
        label.className = "peer-name unknown";
        label.textContent = shortKey(pk) + " (no username yet)";
      }
      label.title = pk;

      row.appendChild(dot);
      row.appendChild(label);
      el.peerList.appendChild(row);
    }
  }

  // ---- identity ----
  async function copyPubkey() {
    if (!selfId) return;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(selfId);
      } else {
        const ta = document.createElement("textarea");
        ta.value = selfId;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      log("info", "Peer ID copied");
    } catch (e) {
      log("error", "Copy failed: " + e.message);
    }
  }

  function showMyId() {
    el.myPubkey.textContent = selfId;
    el.myDot.classList.remove("off");
  }

  // ---- username ----
  async function loadUsername() {
    try {
      myUsername = await idbGet("username");
      el.usernameInput.value = myUsername || "";
    } catch (e) {
      log("error", "Couldn't read username from IndexedDB: " + e.message);
    }
  }

  async function saveUsername() {
    const name = el.usernameInput.value.trim();
    if (!name) return;
    myUsername = name;
    try {
      await idbSet("username", name);
      log("info", "Username saved: " + name);
    } catch (e) {
      log("error", "Couldn't save username to IndexedDB: " + e.message);
    }
    if (nameAction) nameAction.send(myUsername);
  }

  // ---- room ----
  function leaveRoom() {
    if (room) {
      room.leave();
      log("info", "Left room \u201c" + currentRoomName + "\u201d");
    }
    room = null;
    nameAction = null;
    currentRoomName = null;
    peers.clear();
    renderPeers();
    el.roomInput.disabled = false;
    el.joinRoomBtn.textContent = "Join";
    el.joinRoomBtn.classList.remove("warn");
    el.joinRoomBtn.classList.add("primary");
  }

  function joinRoomByName() {
    const roomName = el.roomInput.value.trim();
    if (!roomName) return;

    room = joinRoom({ appId: APP_ID }, roomName);
    currentRoomName = roomName;
    log("event", "Joined room \u201c" + roomName + "\u201d");
    idbSet("lastRoom", roomName).catch((e) =>
      log("error", "Couldn't save last room to IndexedDB: " + e.message)
    );

    nameAction = room.makeAction("name");

    room.onPeerJoin = (peerId) => {
      peers.set(peerId, null);
      log("event", "Peer connected: " + shortKey(peerId));
      renderPeers();
      if (myUsername) nameAction.send(myUsername, { target: peerId });
    };

    room.onPeerLeave = (peerId) => {
      peers.delete(peerId);
      log("event", "Peer disconnected: " + shortKey(peerId));
      renderPeers();
    };

    nameAction.onMessage = (name, { peerId }) => {
      peers.set(peerId, name);
      log("event", shortKey(peerId) + " is now known as \u201c" + name + "\u201d");
      renderPeers();
    };

    el.roomInput.disabled = true;
    el.joinRoomBtn.textContent = "Leave";
    el.joinRoomBtn.classList.remove("primary");
    el.joinRoomBtn.classList.add("warn");
  }

  function toggleRoom() {
    if (room) {
      leaveRoom();
    } else {
      joinRoomByName();
    }
  }

  // ---- wiring ----
  el.copyBtn.addEventListener("click", copyPubkey);
  el.saveUsernameBtn.addEventListener("click", saveUsername);
  el.usernameInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") saveUsername();
  });
  el.joinRoomBtn.addEventListener("click", toggleRoom);
  el.roomInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !room) joinRoomByName();
  });

  // ---- init ----
  (async function init() {
    log("info", "Room opened");
    showMyId();
    await loadUsername();
    try {
      const lastRoom = await idbGet("lastRoom");
      if (lastRoom) el.roomInput.value = lastRoom;
    } catch (e) {
      log("error", "Couldn't read last room from IndexedDB: " + e.message);
    }
  })();
</script>
</body>
</html>
